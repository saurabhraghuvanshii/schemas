name: Deploy Site to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate constructs data
        run: node build/generate-constructs-data.js

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ui

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate Jekyll runtime config
        run: |
          if [ -f CNAME ]; then
            DOMAIN="$(tr -d '\n' < CNAME)"
            cat > ui/_config.runtime.yml <<EOF
url: "https://${DOMAIN}"
baseurl: ""
EOF
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            cat > ui/_config.runtime.yml <<EOF
url: "https://${GITHUB_REPOSITORY_OWNER}.github.io"
baseurl: "/${REPO_NAME}"
EOF
          fi

      - name: Build Jekyll site
        run: cd ui && bundle exec jekyll build --config _config.yml,_config.runtime.yml --destination ../_site
        env:
          JEKYLL_ENV: production

      - name: Copy CNAME
        run: |
          if [ -f CNAME ]; then
            cp CNAME _site/CNAME
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    runs-on: ubuntu-24.04
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

