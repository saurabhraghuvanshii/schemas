name: Deploy Site to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate constructs data
        run: node build/generate-constructs-data.js

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ui

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate Jekyll runtime config
        run: |
          if [ -f CNAME ]; then
            DOMAIN="$(tr -d '\n' < CNAME)"
            printf '%s\n' "url: \"https://${DOMAIN}\"" 'baseurl: ""' > ui/_config.runtime.yml
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            printf '%s\n' "url: \"https://${GITHUB_REPOSITORY_OWNER}.github.io\"" "baseurl: \"/${REPO_NAME}\"" > ui/_config.runtime.yml
          fi

      - name: Build Jekyll site
        run: cd ui && bundle exec jekyll build --config _config.yml,_config.runtime.yml --destination ../_site
        env:
          JEKYLL_ENV: production

      - name: Copy CNAME
        run: |
          if [ -f CNAME ]; then
            cp CNAME _site/CNAME
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
