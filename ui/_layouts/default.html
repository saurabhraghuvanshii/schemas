<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta
      name="description"
      content="{{ page.description | default: site.description | strip_html | truncatewords: 50 }}"
    />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
    {% seo %}
  </head>
  <body>
    {% include header.html %}
    <main>{{ content }}</main>
    {% include footer.html %}
  </body>
</html>
