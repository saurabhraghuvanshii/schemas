openapi: 3.0.0
info:
  title: Relationship
  description: OpenAPI schema for relationship definitions between Meshery components.
  version: v1alpha3
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
paths: {}
components:
  schemas:
    RelationshipDefinition:
      allOf:
        - $ref: "./relationship.yaml#/components/schemas/RelationshipDefinition"

    # Sub-schemas from relationship.yaml that are referenced via x-go-type
    # and need to be top-level schemas so oapi-codegen generates named Go types.

    MatchSelectorItem:
      allOf:
        - $ref: "./relationship.yaml#/components/schemas/MatchSelectorItem"

    MatchSelector:
      allOf:
        - $ref: "./relationship.yaml#/components/schemas/MatchSelector"

    RelationshipDefinition_Selectors_Patch:
      allOf:
        - $ref: "./relationship.yaml#/components/schemas/RelationshipDefinition_Selectors_Patch"
      x-go-name: RelationshipDefinition_Selectors_Patch

    SelectorItem:
      allOf:
        - $ref: "./relationship.yaml#/components/schemas/SelectorItem"

    Selector:
      allOf:
        - $ref: "./relationship.yaml#/components/schemas/Selector"

    SelectorSetItem:
      allOf:
        - $ref: "./relationship.yaml#/components/schemas/SelectorSetItem"

    SelectorSet:
      allOf:
        - $ref: "./relationship.yaml#/components/schemas/SelectorSet"

    Relationship_Metadata:
      allOf:
        - $ref: "./relationship.yaml#/components/schemas/Relationship_Metadata"
      x-go-name: "Relationship_Metadata"

    RelationshipDefinitionMetadataStyles:
      allOf:
        - $ref: "./relationship.yaml#/components/schemas/RelationshipDefinitionMetadataStyles"
