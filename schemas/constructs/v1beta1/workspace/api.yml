openapi: 3.0.0
info:
  title: Workspace
  description: OpenAPI schema for workspace management in Meshery Cloud.
  version: v1beta1
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://cloud.meshery.io
    description: Meshery Cloud production server URL
  - url: https://staging-cloud.meshery.io
    description: Meshery Cloud staging server URL
  - url: http://localhost:9876
    description: Meshery Cloud development server URL (controlled via PORT environment variable)
security:
  - jwt: []
tags:
  - name: workspaces
    description: APIs for Meshery Cloud workspaces.

paths:
  /api/workspaces:
    get:
      x-internal: ["cloud"]
      tags:
        - workspaces
      operationId: GetWorkspaces
      summary: Get all workspaces
      description: Gets all workspaces accessible to the current user.
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/filter"
      responses:
        "200":
          description: Workspaces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/workspacePage"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      x-internal: ["cloud"]
      tags:
        - workspaces
      operationId: CreateWorkspace
      summary: Create a workspace
      description: Creates a new workspace.
      requestBody:
        $ref: "#/components/requestBodies/workspacePayload"
      responses:
        "201":
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/workspace"
        "400":
          $ref: "#/components/responses/400"
        "500":
          $ref: "#/components/responses/500"

  /api/workspaces/{workspaceId}:
    get:
      x-internal: ["cloud"]
      tags:
        - workspaces
      operationId: GetWorkspaceByID
      summary: Get a workspace by ID
      description: Gets a workspace by its ID.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/workspace"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    put:
      x-internal: ["cloud"]
      tags:
        - workspaces
      operationId: UpdateWorkspace
      summary: Update a workspace
      description: Updates a workspace.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      requestBody:
        $ref: "#/components/requestBodies/workspaceUpdatePayload"
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/workspace"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - workspaces
      operationId: DeleteWorkspace
      summary: Delete a workspace
      description: Deletes a workspace by its ID.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/workspace"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/workspaces/{workspaceId}/teams:
    get:
      x-internal: ["cloud"]
      tags:
        - workspaces
      operationId: GetTeamsOfWorkspace
      summary: Get teams assigned to a workspace
      description: Gets teams assigned to or available for a workspace depending on the filter.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/filter"
      responses:
        "200":
          description: Teams
          content:
            application/json:
              schema:
                $ref: "../../v1beta1/team/api.yml#/components/schemas/teamPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/workspaces/{workspaceId}/teams/{teamId}:
    post:
      x-internal: ["cloud"]
      tags:
        - workspaces
      operationId: AssignTeamToWorkspace
      summary: Assign a team to a workspace
      description: Assigns a team to a workspace.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/teamId"
      responses:
        "200":
          description: Workspace team mappings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/workspacesTeamsMappingPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - workspaces
      operationId: UnassignTeamFromWorkspace
      summary: Unassign a team from a workspace
      description: Removes a team from a workspace.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/teamId"
      responses:
        "200":
          description: Workspace team mappings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/workspacesTeamsMappingPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/workspaces/{workspaceId}/environments:
    get:
      x-internal: ["cloud"]
      tags:
        - workspaces
      operationId: GetEnvironmentsOfWorkspace
      summary: Get environments assigned to a workspace
      description: Gets environments assigned to or available for a workspace depending on the filter.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/filter"
      responses:
        "200":
          description: Environments
          content:
            application/json:
              schema:
                $ref: "../../v1beta1/environment/api.yml#/components/schemas/environmentPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/workspaces/{workspaceId}/environments/{environmentId}:
    post:
      x-internal: ["cloud"]
      tags:
        - workspaces
      operationId: AssignEnvironmentToWorkspace
      summary: Assign an environment to a workspace
      description: Assigns an environment to a workspace.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/environmentId"
      responses:
        "200":
          description: Workspace environment mappings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/workspacesEnvironmentsMappingPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - workspaces
      operationId: UnassignEnvironmentFromWorkspace
      summary: Unassign an environment from a workspace
      description: Removes an environment from a workspace.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/environmentId"
      responses:
        "200":
          description: Workspace environment mappings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/workspacesEnvironmentsMappingPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/workspaces/{workspaceId}/designs:
    get:
      x-internal: ["cloud"]
      tags:
        - workspaces
        - designs
      operationId: GetDesignsOfWorkspace
      summary: Get designs assigned to a workspace
      description: Gets designs assigned to or available for a workspace depending on the filter.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/filter"
      responses:
        "200":
          description: Designs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mesheryDesignPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/workspaces/{workspaceId}/designs/{designId}:
    post:
      x-internal: ["cloud"]
      tags:
        - workspaces
        - designs
      operationId: AssignDesignToWorkspace
      summary: Assign a design to a workspace
      description: Assigns a design to a workspace.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/designId"
      responses:
        "200":
          description: Workspace design mappings
          content:
