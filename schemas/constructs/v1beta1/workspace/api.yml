            x-go-type: WorkspacesEnvironmentsMapping
            $ref: "#/components/schemas/workspacesEnvironmentsMapping"

    workspacesDesignsMappingPage:
      type: object
      properties:
        page:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        page_size:
