          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        page_size:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        total_count:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        workspaces:
          type: array
          x-go-type-skip-optional-pointer: true
          items:
            x-go-type: Workspace
            $ref: "#/components/schemas/workspace"

    workspacesTeamsMappingPage:
      type: object
      properties:
        page:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        page_size:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        total_count:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        workspaces_teams_mapping:
          type: array
          x-go-type-skip-optional-pointer: true
          items:
            x-go-type: WorkspacesTeamsMapping
            $ref: "#/components/schemas/workspacesTeamsMapping"

    workspacesEnvironmentsMappingPage:
      type: object
      properties:
        page:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        page_size:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        total_count:
