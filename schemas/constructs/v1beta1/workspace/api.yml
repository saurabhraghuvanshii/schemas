components:
  responses:
    200:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/200"
    400:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/400"
    401:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/401"
    404:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/404"
    500:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/500"

  parameters:
    workspaceId:
      name: workspaceId
      in: path
      description: Workspace ID
      schema:
        $ref: "../../v1alpha1/core/api.yml#/components/schemas/workspace_id"
      required: true
    teamId:
      name: teamId
      in: path
      description: Team ID
      schema:
        $ref: "../../v1alpha1/core/api.yml#/components/schemas/team_id"
      required: true
    environmentId:
      name: environmentId
      in: path
      description: Environment ID
      schema:
        $ref: "../../v1alpha1/core/api.yml#/components/schemas/environment_id"
      required: true
    designId:
      name: designId
      in: path
      description: Design ID
      schema:
        $ref: "../../v1alpha1/core/api.yml#/components/schemas/design_id"
      required: true
    viewId:
      name: viewId
      in: path
      description: View ID
      schema:
        $ref: "../../v1alpha1/core/api.yml#/components/schemas/view_id"
      required: true
    search:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/search"
    order:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/order"
    page:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/page"
    pagesize:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/pagesize"
    filter:
      name: filter
      in: query
      description: JSON-encoded filter string used for assignment and soft-delete filters.
      schema:
        type: string

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    workspace:
      type: object
      properties:
        ID:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/general_id"
        name:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"
        description:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"
        organization_id:
          x-go-name: OrganizationID
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            db: organization_id
            yaml: organization_id
            json: organization_id
          $ref: ../../v1alpha1/core/api.yml#/components/schemas/uuid
          description: Workspace organization ID
        owner:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"
        metadata:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/MapObject"
        created_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"
        updated_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"
        deleted_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/nullTime"

    workspacesTeamsMapping:
      type: object
      properties:
        ID:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/general_id"
        team_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/team_id"
        workspace_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/workspace_id"
        created_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"
        updated_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"
        deleted_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/nullTime"

    workspacesEnvironmentsMapping:
      type: object
      properties:
        ID:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/general_id"
        environment_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/environment_id"
        workspace_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/workspace_id"
        created_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"
        updated_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"
        deleted_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/nullTime"

    workspacesViewsMapping:
      type: object
      properties:
        ID:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/general_id"
        view_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/view_id"
        workspace_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/workspace_id"
        created_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"
        updated_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"
        deleted_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/nullTime"

    workspacesDesignsMapping:
      type: object
      properties:
        ID:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/general_id"
        design_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/design_id"
        workspace_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/workspace_id"
        created_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"
        updated_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"
        deleted_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/nullTime"
    workspacePayload:
      type: object
      required:
        - name
        - organization_id
      properties:
        name:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"
          description: Name of the workspace.
        description:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"
          description: Description of the workspace.
        organization_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/uuid"
          description: Organization ID.
          x-go-type-skip-optional-pointer: true
          x-go-name: OrganizationID
          x-oapi-codegen-extra-tags:
            json: organization_id
            yaml: organization_id

    workspaceUpdatePayload:
      type: object
      required:
        - organization_id
      properties:
        name:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"
          description: Name of the workspace.
        description:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"
          description: Description of the workspace.
        organization_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/uuid"
          description: Organization ID.
          x-go-type-skip-optional-pointer: true
          x-go-name: OrganizationID
          x-oapi-codegen-extra-tags:
