        workspaces_designs_mapping:
          type: array
          x-go-type-skip-optional-pointer: true
          items:
            x-go-type: WorkspacesDesignsMapping
            $ref: "#/components/schemas/workspacesDesignsMapping"

    workspacesViewsMappingPage:
      type: object
      properties:
        page:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        page_size:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        total_count:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        workspaces_views_mapping:
          type: array
          x-go-type-skip-optional-pointer: true
          items:
            x-go-type: WorkspacesViewsMapping
            $ref: "#/components/schemas/workspacesViewsMapping"

    mesheryDesignPage:
      type: object
      properties:
        page:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        page_size:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        total_count:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        designs:
          type: array
          x-go-type-skip-optional-pointer: true
          items:
            $ref: "../../v1beta1/design/api.yml#/components/schemas/MesheryPattern"

    mesheryView:
      type: object
      properties:
        ID:
