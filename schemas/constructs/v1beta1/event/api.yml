openapi: 3.0.0
info:
  title: Events
  description: OpenAPI schema for Meshery events and system notifications.
  version: v1beta1
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

tags:
  - name: events
    description: APIs for Meshery Cloud events.

paths:
  /events/{id}:
    delete:
      tags:
        - events
      summary: Delete a single event
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the event to delete
      responses:
        "200":
          description: Event deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  event_id:
                    type: string
                    format: uuid
        "400":
          description: Invalid event ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error

  /events:
    post:
      tags:
        - events
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Event created successfully
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
    delete:
      tags:
        - events
      summary: Bulk delete events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRequest"
      responses:
        "200":
          description: event deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: array
                    items:
                      type: string
                      format: uuid
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error

  /events/status:
    put:
      tags:
        - events
      summary: Bulk update event status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdateStatusRequest"
      responses:
        "200":
          description: Events updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: array
                    items:
                      type: string
                      format: uuid
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error

  /events/{id}/status:
    put:
      tags:
        - events
      summary: Update status of a single event
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventStatusRequest"
      responses:
        "200":
          description: Event status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  event_id:
                    type: string
                    format: uuid
                  status:
                    type: string
        "400":
          description: Invalid request or status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error

  /api/workspaces/{workspaceId}/events:
    get:
      x-internal: ["cloud"]
      tags:
        - events
      security:
        - jwt: []
      operationId: getEventsOfWorkspace
      summary: Get workspace events
      description: Gets events for a workspace.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
      responses:
        "200":
          description: Workspace events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/eventsPage"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "404":
          description: Workspace not found
        "500":
          description: Server error

components:
  parameters:
    workspaceId:
      name: workspaceId
      in: path
      description: Workspace ID
      schema:
        $ref: "../../v1alpha1/core/api.yml#/components/schemas/workspace_id"
      required: true
    page:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/page"
    pagesize:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/pagesize"
    search:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/search"
    order:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/order"

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UpdateEventStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: completed

    BulkDeleteRequest:
      type: object
      required:
        - ids
      properties:
        ids:
          type: array
          items:
            $ref: "../../v1alpha1/core/api.yml#/components/schemas/uuid"

    BulkUpdateStatusRequest:
      type: object
      required:
        - ids
        - status
      properties:
        ids:
          type: array
          items:
            $ref: "../../v1alpha1/core/api.yml#/components/schemas/uuid"
        status:
          type: string
          example: failed

    eventResult:
      type: object
      properties:
        user_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/user_uuid"
        system_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/system_id"
        category:
          type: string
        action:
          type: string
        description:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/email"
        provider:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/provider"
        created_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/created_at"

    eventsPage:
      type: object
      properties:
        page:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        page_size:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        total_count:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/number"
        data:
          type: array
          items:
            $ref: "#/components/schemas/eventResult"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
