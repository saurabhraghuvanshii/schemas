openapi: 3.0.0
info:
  title: Design
  description: OpenAPI schema for managing Meshery designs and infrastructure patterns.
  version: v1beta1
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
paths:
  /api/content/patterns:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get designs
      operationId: getPatterns
      description: Returns a paginated list of infrastructure designs accessible to the user.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - name: visibility
          in: query
          description: Filter by visibility (public, private, published)
          schema:
            type: string
      responses:
        "200":
          description: Designs fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPatternPage"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Save design
      operationId: upsertPattern
      description: Creates or updates an infrastructure design.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MesheryPatternRequestBody"
      responses:
        "200":
          description: Design saved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPattern"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Bulk delete designs
      operationId: deletePatterns
      description: Deletes multiple designs by ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MesheryPatternDeleteRequestBody"
      responses:
        "200":
          description: Designs deleted successfully
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/resource:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get pattern resources
      operationId: getPatternResources
      description: Returns pattern resource definitions.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
      responses:
        "200":
          description: Pattern resources fetched successfully
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Save pattern resource
      operationId: upsertPatternResource
      description: Creates or updates a pattern resource definition.
      responses:
        "200":
          description: Pattern resource saved successfully
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/resource/{id}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get pattern resource by ID
      operationId: getPatternResource
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Pattern resource fetched successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Delete pattern resource
      operationId: deletePatternResource
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: Pattern resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/{id}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get design by ID
      operationId: getPattern
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Design fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPattern"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Delete design by ID
      operationId: deletePattern
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: Design deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/clone/{id}:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Clone design
      operationId: clonePattern
      description: Creates a copy of an existing design.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Design cloned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPattern"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/download/{id}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Download design file
      operationId: getDesignPatternFile
      description: Downloads the raw design file for the specified design.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Design file content
          content:
            application/yaml:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/upload/{id}:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Upload design source content
      operationId: upsertPatternSourceContent
      description: Uploads or replaces the source content for a design.
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MesheryPatternImportRequestBody"
      responses:
        "200":
          description: Design source content uploaded successfully
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/pattern/import:
    post:
      summary: Import Design
      operationId: importDesign
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MesheryPatternImportRequestBody"
      responses:
        "200":
          description: Successful Import
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Invalid request format
        "500":
          description: Internal server error
components:
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    400:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/400"
    401:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/401"
    404:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/404"
    500:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/500"

  parameters:
    id:
      name: id
      in: path
      description: Design (Pattern) ID
      required: true
      schema:
        $ref: "../../v1alpha1/core/api.yml#/components/schemas/uuid"
    page:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/page"
    pagesize:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/pagesize"
    search:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/search"
    order:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/order"

  schemas:
    DeletePatternModel:
      type: object
      properties:
        id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Id"
        name:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"

    PatternFile:
      $ref: "./design.yaml"

    MesheryPattern:
      type: object
      properties:
        catalog_data:
          $ref: "../../v1alpha2/catalog/api.yml#/components/schemas/CatalogData"
          x-go-type: catalogv1alpha2.CatalogData
          x-go-type-import:
            path: github.com/meshery/schemas/models/v1alpha2/catalog
            name: catalogv1alpha2

        created_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"
        user_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Id"
        location:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/MapObject"
        name:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"
        pattern_file:
          $ref: "#/components/schemas/PatternFile"
          x-go-type: PatternFile

        updated_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"
        id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Id"
        visibility:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"

    MesheryPatternPage:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/MesheryPattern"
            x-go-type: MesheryPattern

        resultType:
          type: string
        total_count:
          type: integer

    MesheryPatternDeleteRequestBody:
      type: object
      properties:
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/DeletePatternModel"
            x-go-type: DeletePatternModel

    MesheryPatternRequestBody:
      type: object
      properties:
        path:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"
        pattern_data:
          $ref: "#/components/schemas/MesheryPattern"
          x-go-type: MesheryPattern
        save:
          type: boolean
        url:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Endpoint"
        name:
          type: string

    MesheryPatternImportRequestBody:
      type: object
      description: "Choose the method you prefer to upload your  design file. Select 'File Upload' if you have the file on your local system, or 'URL Import' if you have the file hosted online."
      enum:
        - file
        - url
      properties:
        file:
          type: string
          format: file
          description: "Supported formats: Kubernetes Manifests, Helm Charts, Docker Compose, and Meshery Designs. See [Import Designs Documentation](https://docs.meshery.io/guides/configuration-management/importing-designs#import-designs-using-meshery-ui) for details"
        file_name:
          type: string
          description: "The name of the pattern file being imported."
        name:
          type: string
          default: "Untitled Design"
          description: "Provide a name for your design file. This name will help you identify the file more easily. You can also change the name of your design after importing it."
        url:
          type: string
          format: uri
          description: "Provide the URL of the file you want to import. This should be a direct URL to a single file, for example: https://raw.github.com/your-design-file.yaml. Also, ensure that design is in a supported format: Kubernetes Manifest, Helm Chart, Docker Compose, or Meshery Design. See [Import Designs Documentation](https://docs.meshery.io/guides/configuration-management/importing-designs#import-designs-using-meshery-ui) for details"

    DesignPreferences:
      type: object
      description: Design-level preferences
      x-order: 7
      properties:
        layers:
          type: object
          description: Map of available layers, where keys are layer names.
      required:
        - layers
